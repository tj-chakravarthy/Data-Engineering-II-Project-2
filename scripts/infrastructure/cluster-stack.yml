version: '3.8'

networks:
  pulsar-net:
    driver: overlay

services:
  pulsar:
    image: apachepulsar/pulsar:4.0.10
    command: bin/pulsar standalone
    networks:
      - pulsar-net
    ports:
      - "6650:6650"
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 40s
