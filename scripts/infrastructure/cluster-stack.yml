networks:
  pulsar-net:
    driver: overlay
    attachable: true

services:
  pulsar:
    image: apachepulsar/pulsar:4.0.10
    command: bin/pulsar standalone
    networks:
      - pulsar-net
    ports:
      - "6650:6650"
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  crawler:
    image: "${CRAWLER_IMAGE}"
    command: >
      python -m streaming.pulsar_producer
      --days ${CRAWL_DAYS}
      --date-field ${CRAWL_DATE_FIELD}
      --checkpoint-path data/output/repos.published.json
    networks:
      - pulsar-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    volumes:
      - /home/ubuntu/app/data:/app/data
    environment:
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2}
      - GITHUB_TOKEN_3=${GITHUB_TOKEN_3}
      - PULSAR_SERVICE_URL=${PULSAR_SERVICE_URL}
      - PULSAR_TOPIC=${PULSAR_TOPIC}

  consumer:
    image: "${CRAWLER_IMAGE}"
    command: python -m streaming.pulsar_toy_consumer
    networks:
      - pulsar-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    environment:
      - PULSAR_SERVICE_URL=${PULSAR_SERVICE_URL}
      - PULSAR_TOPIC=${PULSAR_TOPIC}
      - PULSAR_SUBSCRIPTION=${PULSAR_SUBSCRIPTION}
