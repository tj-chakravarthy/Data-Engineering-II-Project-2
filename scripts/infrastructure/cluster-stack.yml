version: '3.8'

networks:
  pulsar-net:
    driver: overlay

services:
  pulsar:
    image: apachepulsar/pulsar:4.0.10
    command: bin/pulsar standalone
    networks:
      - pulsar-net
    ports:
      - "6650:6650"
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  crawler:
    image: "${CRAWLER_IMAGE:-andreashadjoullis1153/crawler:latest}"
    # fixed by TJ: default stack run is production-shaped; set CRAWL_DAYS=1
    # in .env when we only want a quick smoke test.
    command: >
      python -m streaming.pulsar_producer
      --days ${CRAWL_DAYS:-365}
      --date-field ${CRAWL_DATE_FIELD:-created-or-pushed}
      --cache-dir data/cache
      --checkpoint-path data/output/repos.published.json
    networks:
      - pulsar-net
    environment:
      PULSAR_SERVICE_URL: "${PULSAR_SERVICE_URL:-pulsar://pulsar:6650}"
      PULSAR_TOPIC: "${PULSAR_TOPIC:-repos.raw}"
      # fixed by TJ: pass both token naming styles so the committed course env
      # and local .env files both work with the crawler's token-pool logic.
      GITHUB_TOKEN: "${GITHUB_TOKEN:-}"
      GITHUB_TOKEN_1: "${GITHUB_TOKEN_1:-}"
      GITHUB_TOKEN_2: "${GITHUB_TOKEN_2:-}"
      GITHUB_TOKEN_3: "${GITHUB_TOKEN_3:-}"
      GITHUB_TOKEN_4: "${GITHUB_TOKEN_4:-}"
      GITHUB_TOKEN_5: "${GITHUB_TOKEN_5:-}"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      # fixed by TJ: the crawler is a one-shot batch job, not a service. It
      # exits 0 when the crawl is done and exits 1 when some records hit a
      # permanent publish failure. With restart_policy on-failure, an exit-1
      # run would restart and re-crawl forever. condition: none means a failed
      # run stays stopped so we can look at the logs instead of hiding the
      # failure behind an endless restart loop.
      restart_policy:
        condition: none
    volumes:
      # fixed by TJ: Swarm bind mounts should use the VM's absolute repo path.
      - /home/ubuntu/app/data:/app/data

  consumer:
    image: "${CRAWLER_IMAGE:-andreashadjoullis1153/crawler:latest}"
    command: python -m streaming.pulsar_toy_consumer
    networks:
      - pulsar-net
    environment:
      PULSAR_SERVICE_URL: "${PULSAR_SERVICE_URL:-pulsar://pulsar:6650}"
      PULSAR_TOPIC: "${PULSAR_TOPIC:-repos.raw}"
      PULSAR_SUBSCRIPTION: "${PULSAR_SUBSCRIPTION:-debug-consumer}"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == worker]
      restart_policy:
        condition: on-failure
