networks:
  pulsar-net:
    driver: overlay
    attachable: true

services:
  pulsar:
    image: apachepulsar/pulsar:4.0.10
    command: bin/pulsar standalone
    networks:
      - pulsar-net
    ports:
      - "6650:6650"
      - "8080:8080"
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    healthcheck:
      test: ["CMD", "bin/pulsar-admin", "brokers", "healthcheck"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s

  crawler:
    image: "${CRAWLER_IMAGE}"
    command: >
      python -m streaming.pulsar_producer
      --days ${CRAWL_DAYS}
      --date-field ${CRAWL_DATE_FIELD}
      --checkpoint-path data/output/repos.published.json
    networks:
      - pulsar-net
    deploy:
      replicas: 1
      placement:
        constraints: [node.role == manager]
      restart_policy:
        condition: on-failure
    volumes:
      - /home/ubuntu/app/data:/app/data
    environment:
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2}
      - GITHUB_TOKEN_3=${GITHUB_TOKEN_3}
      - GITHUB_TOKEN_4=${GITHUB_TOKEN_4}
      - GITHUB_TOKEN_5=${GITHUB_TOKEN_5}
      # fixed by TJ stride-slice token partitioning so replicas don't share tokens
      - RUNNER_ID=${CRAWLER_RUNNER_ID:-0}
      - NUM_RUNNERS=${CRAWLER_NUM_RUNNERS:-1}
      - PULSAR_SERVICE_URL=${PULSAR_SERVICE_URL}
      - PULSAR_TOPIC=${PULSAR_TOPIC}

  analytics:
    image: "${CRAWLER_IMAGE}"
    command: python -m analytics.runner
    networks:
      - pulsar-net
    deploy:
      replicas: ${ANALYTICS_NUM_RUNNERS:-1}
      placement:
        constraints:
          - node.labels.analytics == true
      restart_policy:
        condition: on-failure
    volumes:
      - /home/ubuntu/app/data:/app/data
    environment:
      - PULSAR_SERVICE_URL=${PULSAR_SERVICE_URL}
      - RAW_TOPIC=${PULSAR_TOPIC}
      # fixed by TJ runner only reads RAW_TOPIC and ENRICHED_TOPIC now
      - ENRICHED_TOPIC=${ENRICHED_TOPIC:-repos.enriched}
      - ANALYTICS_SUBSCRIPTION=${ANALYTICS_SUBSCRIPTION}
      - FLUSH_EVERY=${FLUSH_EVERY:-100}
      - RUNNER_BATCH_SIZE=${RUNNER_BATCH_SIZE:-}
      - FLUSH_IDLE_SECONDS=${FLUSH_IDLE_SECONDS:-30}
      - ENRICH_GITHUB=${ENRICH_GITHUB}
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2}
      - GITHUB_TOKEN_3=${GITHUB_TOKEN_3}
      - GITHUB_TOKEN_4=${GITHUB_TOKEN_4}
      - GITHUB_TOKEN_5=${GITHUB_TOKEN_5}
      # fixed by TJ use Swarm's task slot for disjoint token slices per replica
      - RUNNER_SLOT={{.Task.Slot}}
      - NUM_RUNNERS=${ANALYTICS_NUM_RUNNERS:-1}

  # fixed by TJ added aggregator service
  analytics-aggregator:
    image: "${CRAWLER_IMAGE}"
    command: python -m analytics.aggregator
    networks:
      - pulsar-net
    deploy:
      replicas: 1
      placement:
        # fixed by TJ co-locate with runner so they share the host volume
        constraints:
          - node.labels.analytics == true
      restart_policy:
        condition: on-failure
    volumes:
      - /home/ubuntu/app/data:/app/data
    environment:
      - PULSAR_SERVICE_URL=${PULSAR_SERVICE_URL}
      - ENRICHED_TOPIC=${ENRICHED_TOPIC:-repos.enriched}
      - AGGREGATOR_SUBSCRIPTION=${AGGREGATOR_SUBSCRIPTION:-analytics-aggregator}
      - TOP_N=${TOP_N:-10}
      - FLUSH_EVERY=${FLUSH_EVERY:-100}
      - FLUSH_IDLE_SECONDS=${FLUSH_IDLE_SECONDS:-30}
      - RESULTS_DIR=/app/data/results
      - FIGURES_DIR=/app/data/figures
      - ANALYTICS_STATE_PATH=/app/data/results/analytics_state.json
